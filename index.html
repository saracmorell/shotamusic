<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOTA | Official Artist Site</title>
  <meta
    name="description"
    content="Official artist site for SHOTA. Explore featured releases, streaming platforms, visuals, and connect across channels."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #060606;
      --bg-soft: #0d0d0d;
      --gold: #d5b36a;
      --gold-soft: #f0d89d;
      --text: #f5f1e8;
      --muted: #b8b0a2;
      --muted-2: #8f8779;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --max: 1320px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(213,179,106,0.10), transparent 35%),
        linear-gradient(to bottom, #060606 0%, #0a0a0a 40%, #060606 100%);
      color: var(--text);
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 120px 120px;
      z-index: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .wrap {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(6, 6, 6, 0.45);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .nav-links a {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--gold-soft);
    }

    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      padding-top: 110px;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
